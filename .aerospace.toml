# ─── AeroSpace config ─────────────────────────────────────────────────────────
# macOS only — Linux equivalent: i3/Sway (see README)

after-login-command = []
after-startup-command = []

start-at-login = true

# ─── Normalization ────────────────────────────────────────────────────────────
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ─── Layout ───────────────────────────────────────────────────────────────────
accordion-padding = 70
default-root-container-layout = 'accordion'
default-root-container-orientation = 'vertical'

key-mapping.preset = 'qwerty'

# ─── Mouse follows focus ──────────────────────────────────────────────────────
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = 'move-mouse window-lazy-center'

# ─── Gaps ─────────────────────────────────────────────────────────────────────
[gaps]
inner.horizontal = 60
inner.vertical   = 60
outer.left       = 60
outer.bottom     = 60
outer.top        = 60
outer.right      = 60

# ─── Keybindings ──────────────────────────────────────────────────────────────
[mode.main.binding]

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion vertical horizontal'

# Focus (vim keys)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Workspaces — numeric
alt-0 = 'workspace 0'
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Workspaces — named
alt-t = 'workspace T'
alt-b = 'workspace B'
alt-v = 'workspace V'

# Move node to workspace — numeric
alt-shift-0 = 'move-node-to-workspace 0'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Move node to workspace — named
alt-shift-t = 'move-node-to-workspace T'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-v = 'move-node-to-workspace V'

# Misc
alt-shift-f   = 'fullscreen'
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Modes
alt-shift-semicolon = 'mode service'
alt-shift-r         = 'mode resize'

# ─── Resize mode ──────────────────────────────────────────────────────────────
[mode.resize.binding]
h     = 'resize width -50'
j     = 'resize height +50'
k     = 'resize height -50'
l     = 'resize width +50'
b     = 'balance-sizes'
minus = 'resize smart -50'
equal = 'resize smart +50'
enter = 'mode main'
esc   = 'mode main'

# ─── Service mode ─────────────────────────────────────────────────────────────
[mode.service.binding]
esc       = ['reload-config', 'mode main']
r         = ['flatten-workspace-tree', 'mode main']
f         = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# ─── App → workspace rules ────────────────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace V'

# Cursor (VS Code fork — com.todesktop.230313mzl4w4u92)
[[on-window-detected]]
if.app-id = 'com.todesktop.230313mzl4w4u92'
run = 'move-node-to-workspace V'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace B'

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'
run = 'move-node-to-workspace B'

# OrbStack
[[on-window-detected]]
if.app-id = 'dev.orbstack.OrbStack'
run = 'move-node-to-workspace T'

# Insomnia
[[on-window-detected]]
if.app-id = 'com.insomnia.app'
run = 'move-node-to-workspace T'

# ─── Floating apps ────────────────────────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'
