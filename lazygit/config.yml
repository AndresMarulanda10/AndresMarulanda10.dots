git:
  commit:
    signOff: false
  merging:
    manualCommit: false
  branchLogCmd: "git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --"

keybinding:
  universal:
    quit: "q"
    return: "<esc>"
    scrollUpMain: "<pgup>"
    scrollDownMain: "<pgdown>"
  commits:
    moveDownCommit: "<c-j>"
    moveUpCommit: "<c-k>"

os:
  editPreset: vscode
