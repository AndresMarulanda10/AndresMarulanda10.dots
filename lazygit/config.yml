# #FF6188 pink  | #FC9867 orange | #FFD866 yellow
# #A9DC76 green | #78DCE8 cyan   | #AB9DF2 purple
# #272822 bg    | #FCFCFA fg     | #403E41 border

gui:
  nerdFontsVersion: "2"
  border: "rounded"
  theme:
    activeBorderColor:
      - "#A9DC76"
      - bold
    inactiveBorderColor:
      - "#403E41"
    searchingActiveBorderColor:
      - "#FFD866"
      - bold
    optionsTextColor:
      - "#78DCE8"
    selectedLineBgColor:
      - "#3a3a3a"
    cherryPickedCommitBgColor:
      - "#AB9DF2"
    cherryPickedCommitFgColor:
      - "#272822"
    unstagedChangesColor:
      - "#FF6188"
    defaultFgColor:
      - "#FCFCFA"
    authorFgColor:
      - "#FC9867"
  customHeader: |2
